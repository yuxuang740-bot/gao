<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Digital Deconstruction: Aesthetic Feed</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root { 
            --bg-color: #000; 
            --accent: #00ffcc; 
            --text-main: #ffffff;
            --text-dim: #a8a8a8;
            --border: #1a1a1a;
            --heart-red: #ff3040;
            --nav-bg: rgba(0, 0, 0, 0.9);
            --modal-bg: rgba(15, 15, 15, 0.98);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-color); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Top Navigation */
        nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: var(--nav-bg); border-bottom: 1px solid var(--border);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(20px);
        }
        .nav-content { 
            width: 100%; max-width: 800px; 
            display: flex; justify-content: space-between; 
            padding: 0 20px; align-items: center;
        }
        
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .logo { font-family: 'Courier New', monospace; font-weight: bold; font-size: 18px; letter-spacing: 1px; color: var(--text-main); }
        
        .lang-select {
            background: transparent; border: 1px solid var(--border);
            color: var(--text-dim); font-size: 11px; padding: 4px 6px;
            border-radius: 4px; outline: none; cursor: pointer;
            transition: all 0.2s;
        }
        .lang-select:hover { border-color: var(--accent); color: white; }

        .nav-right { display: flex; align-items: center; gap: 20px; }

        .create-btn {
            background: var(--accent); color: #000;
            padding: 6px 14px; border-radius: 20px;
            font-size: 13px; font-weight: 700; cursor: pointer;
            border: none; transition: transform 0.1s;
            display: flex; align-items: center; gap: 5px;
        }
        .create-btn:active { transform: scale(0.95); opacity: 0.9; }

        /* Main Feed */
        main { margin-top: 60px; width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; }

        .post {
            width: 100%; max-width: 500px;
            background: var(--bg-color);
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .post-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
        .header-left { display: flex; align-items: center; }
        .avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(45deg, #222, #444);
            margin-right: 12px; border: 1px solid var(--border);
        }
        .username { font-weight: 600; font-size: 14px; margin-right: 10px; }
        
        .follow-btn { font-size: 13px; font-weight: 600; color: var(--accent); cursor: pointer; transition: 0.2s; padding: 4px 8px; }
        .follow-btn.following { color: var(--text-dim); }

        .media-box { position: relative; width: 100%; aspect-ratio: 1 / 1; background: #050505; overflow: hidden; }
        .canvas-overlay { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; opacity: 0.5; }

        .pop-heart {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            pointer-events: none; z-index: 10; filter: drop-shadow(0 0 15px rgba(255,48,64,0.4));
        }
        .pop-heart.animate { animation: heart-pop 0.8s ease-out; }
        @keyframes heart-pop {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            30% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .post-footer { padding: 12px 16px; }
        .action-btns { display: flex; gap: 18px; margin-bottom: 8px; }
        .btn-svg { cursor: pointer; transition: transform 0.1s; background: none; border: none; color: white; padding: 0; }
        .btn-svg:active { transform: scale(0.8); }
        .btn-svg.liked { color: var(--heart-red); }

        .stats { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
        .caption { font-size: 14px; line-height: 1.5; margin-bottom: 10px; }
        .caption b { margin-right: 8px; }

        .comments-area { margin-top: 5px; }
        .comment-row { font-size: 14px; margin-bottom: 4px; }
        .comment-row b.user-label { margin-right: 6px; }

        .comment-bar { display: flex; align-items: center; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 12px; }
        .comment-input { background: transparent; border: none; color: white; flex: 1; font-size: 14px; outline: none; }
        .post-action { color: var(--accent); font-weight: 600; font-size: 14px; cursor: pointer; opacity: 0.4; pointer-events: none; }
        .post-action.active { opacity: 1; pointer-events: auto; }

        /* Modals */
        #shareModal, #echoModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000;
            display: none; justify-content: center; align-items: center;
            backdrop-filter: blur(15px);
        }
        .modal-content {
            background: var(--modal-bg); width: 90%; max-width: 400px;
            padding: 40px 20px; border-radius: 32px; border: 1px solid var(--border);
            text-align: center; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 30px; color: var(--text-main); letter-spacing: 1px; }
        .share-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 35px; }
        
        .share-item { cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 10px; transition: 0.3s; }
        .share-item span { font-size: 11px; color: var(--text-dim); font-weight: 500; }
        
        .cute-icon-box {
            width: 64px; height: 64px; border-radius: 22px;
            display: flex; justify-content: center; align-items: center;
            background: #151515; position: relative; overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .share-item:hover .cute-icon-box { transform: translateY(-5px) scale(1.05); background: #222; }

        .icon-svg { width: 32px; height: 32px; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .brand-friend { stroke: #ff8df1; }
        .brand-family { stroke: #7df9ff; }
        .brand-others { stroke: #e0ff7d; }

        .copy-box {
            background: #0a0a0a; border: 1px solid var(--border); padding: 14px;
            border-radius: 16px; display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; color: var(--text-dim); cursor: pointer; transition: 0.2s;
        }
        .copy-box:hover { border-color: var(--accent); background: #111; color: var(--text-main); }
        
        .echo-content { padding: 20px; color: var(--text-main); }
        .echo-quote {
            font-size: 24px; font-weight: 200; line-height: 1.6; margin-bottom: 30px;
            font-style: italic; color: var(--accent); text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }
        .echo-author { font-size: 14px; color: var(--text-dim); letter-spacing: 3px; }
        .close-echo {
            margin-top: 40px; background: transparent; border: 1px solid var(--border);
            color: var(--text-dim); padding: 10px 20px; border-radius: 30px;
            cursor: pointer; font-size: 12px; transition: 0.3s;
        }
        .close-echo:hover { border-color: var(--accent); color: var(--text-main); }

        .icon-path { fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        .filled { fill: currentColor; stroke: none; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content">
            <div class="nav-left">
                <div class="logo">DIGITAL_FEED</div>
                <select class="lang-select" id="langSwitcher">
                    <option value="en">EN</option>
                    <option value="zh">ZH</option>
                    <option value="it">IT</option>
                </select>
            </div>
            <div class="nav-right">
                <button class="create-btn" id="createBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    <span id="createTxt">Create</span>
                </button>
                <div style="display:flex; gap:16px; font-size:18px;">
                    <svg width="22" height="22" viewBox="0 0 24 24"><circle class="icon-path" cx="12" cy="12" r="10"/><path class="icon-path" d="M12 6v6l4 2"/></svg>
                    <svg width="22" height="22" viewBox="0 0 24 24"><path class="icon-path" d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle class="icon-path" cx="12" cy="7" r="4"/></svg>
                </div>
            </div>
        </div>
    </nav>

    <main id="feed-root"></main>

    <div id="shareModal">
        <div class="modal-content">
            <div class="modal-title" id="shareTitle">Share to Virtual Sphere</div>
            <div class="share-grid">
                <div class="share-item"><div class="cute-icon-box"><svg class="icon-svg brand-friend" viewBox="0 0 24 24"><circle cx="9" cy="12" r="5"/><circle cx="15" cy="12" r="5"/></svg></div><span id="friendTxt">Friend</span></div>
                <div class="share-item"><div class="cute-icon-box"><svg class="icon-svg brand-family" viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg></div><span id="familyTxt">Family</span></div>
                <div class="share-item"><div class="cute-icon-box"><svg class="icon-svg brand-others" viewBox="0 0 24 24"><path d="M4 12c4-4 12-4 16 0"/><path d="M4 16c4-4 12-4 16 0" opacity="0.4"/><circle cx="12" cy="9" r="1" fill="currentColor"/></svg></div><span id="othersTxt">Others</span></div>
            </div>
            <div class="copy-box" id="copyBtn">
                <span id="linkTxt">Click to see your Soul Echo</span>
                <svg width="16" height="16" viewBox="0 0 24 24"><path class="icon-path" d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/></svg>
            </div>
        </div>
    </div>

    <div id="echoModal">
        <div class="modal-content echo-content">
            <div class="echo-quote" id="echoQuote">"The privilege of a lifetime is to become who you truly are."</div>
            <div class="echo-author" id="echoAuthor">— CARL JUNG</div>
            <button class="close-echo" id="closeEchoBtn" onclick="document.getElementById('echoModal').style.display='none'">RETURN TO FEED</button>
        </div>
    </div>

    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
    </script>
    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec2 vUv;
        uniform sampler2D tDiffuse;
        uniform float time;
        void main() {
            vec2 base = 0.5 + (vUv - 0.5) * 0.8;
            vec3 color = texture2D(tDiffuse, base).rgb;
            gl_FragColor = vec4(color, 0.6);
        }
    </script>

    <script>
        const i18n = {
            en: {
                create: "Create", follow: "Follow", following: "Following", likes: "likes",
                commentPlaceholder: "Add a comment...", post: "Post", you: "You",
                shareTitle: "Share to Virtual Sphere",
                friend: "Friend", family: "Family", others: "Others",
                echoQuote: "The privilege of a lifetime is to become who you truly are.",
                echoAuthor: "— CARL JUNG", linkLabel: "Click to see your Soul Echo",
                returnBtn: "RETURN TO FEED"
            },
            zh: {
                create: "发布", follow: "关注", following: "已关注", likes: "次赞",
                commentPlaceholder: "添加评论...", post: "发布", you: "你",
                shareTitle: "分享至虚构场域",
                friend: "朋友", family: "家人", others: "其他",
                echoQuote: "人一生中最大的特权，就是成为真正的自己。",
                echoAuthor: "— 荣格", linkLabel: "点击开启你的真实回响",
                returnBtn: "返回信息流"
            },
            it: {
                create: "Crea", follow: "Segui", following: "Seguito", likes: "mi piace",
                commentPlaceholder: "Aggiungi un commento...", post: "Pubblica", you: "Tu",
                shareTitle: "Condividi nella Sfera Virtuale",
                friend: "Amici", family: "Famiglia", others: "Altro",
                echoQuote: "Il privilegio di una vita è diventare chi sei veramente.",
                echoAuthor: "— CARL JUNG", linkLabel: "Clicca per il tuo Echo dell'Anima",
                returnBtn: "TORNA AL FEED"
            }
        };

        let currentLang = 'en';
        const postsData = [
            { id: "v1", user: "arch_human", likes: 2541, caption: "Parsing biological structures. ID: #772" },
            { id: "v2", user: "neural_flux", likes: 1890, caption: "Data stream: Real-time facial reconstruction." },
            { id: "v3", user: "void_walker", likes: 4211, caption: "Searching for identity in digital gaps." }
        ];
        const rendererList = [];

        function init() {
            renderFeed();
            document.getElementById('langSwitcher').addEventListener('change', (e) => {
                currentLang = e.target.value;
                updateLanguageUI();
            });

            const shareModal = document.getElementById('shareModal');
            shareModal.onclick = (e) => { if(e.target === shareModal) shareModal.style.display = 'none'; };

            document.getElementById('copyBtn').onclick = () => {
                shareModal.style.display = 'none';
                document.getElementById('echoModal').style.display = 'flex';
            };

            animate();
        }

        function renderFeed() {
            const root = document.getElementById('feed-root');
            root.innerHTML = '';
            postsData.forEach(p => {
                const el = document.createElement('div');
                el.className = 'post';
                el.innerHTML = `
                    <div class="post-header">
                        <div class="header-left">
                            <div class="avatar"></div>
                            <span class="username">${p.user}</span>
                            <span class="follow-btn" id="follow-${p.id}">• ${i18n[currentLang].follow}</span>
                        </div>
                    </div>
                    <div class="media-box" id="media-${p.id}">
                        <div class="canvas-overlay"></div>
                        <div class="pop-heart"><svg width="80" height="80" viewBox="0 0 24 24" fill="#ff3040"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
                    </div>
                    <div class="post-footer">
                        <div class="action-btns">
                            <button class="btn-svg like-btn" id="lbtn-${p.id}"><svg width="24" height="24" viewBox="0 0 24 24"><path class="icon-path" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
                            <button class="btn-svg share-trigger"><svg width="24" height="24" viewBox="0 0 24 24"><path class="icon-path" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
                        </div>
                        <div class="stats" id="stat-${p.id}">${p.likes} ${i18n[currentLang].likes}</div>
                        <div class="caption"><b>${p.user}</b>${p.caption}</div>
                        <div class="comments-area" id="comm-list-${p.id}"></div>
                        <div class="comment-bar">
                            <input type="text" class="comment-input" placeholder="${i18n[currentLang].commentPlaceholder}" id="input-${p.id}">
                            <span class="post-action" id="post-${p.id}">${i18n[currentLang].post}</span>
                        </div>
                    </div>
                `;
                root.appendChild(el);
                setupThreeJS(el.querySelector('.canvas-overlay'));
                setupLogic(p.id, el);
            });
        }

        function setupThreeJS(container) {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
            camera.position.z = 5;
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth || 400, container.clientWidth || 400);
            container.appendChild(renderer.domElement);
            
            const size = 64;
            const data = new Uint8Array(size * size * 3);
            for(let i=0; i<data.length; i++) data[i] = Math.random() * 80;
            const tex = new THREE.DataTexture(data, size, size, THREE.RGBFormat);
            tex.needsUpdate = true;

            const mat = new THREE.ShaderMaterial({
                uniforms: { tDiffuse: { value: tex }, time: { value: 0 } },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true
            });
            const mesh = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), mat);
            scene.add(mesh);
            rendererList.push({ scene, camera, renderer, mesh });
        }

        function setupLogic(id, el) {
            const followBtn = el.querySelector(`#follow-${id}`);
            const likeBtn = el.querySelector(`#lbtn-${id}`);
            const stats = el.querySelector(`#stat-${id}`);
            const media = el.querySelector('.media-box');
            const popHeart = el.querySelector('.pop-heart');
            const input = el.querySelector(`#input-${id}`);
            const postBtn = el.querySelector(`#post-${id}`);
            const commList = el.querySelector(`#comm-list-${id}`);

            let isLiked = false;
            let isFollowing = false;
            let currentLikes = postsData.find(x => x.id === id).likes;

            followBtn.onclick = () => {
                isFollowing = !isFollowing;
                followBtn.innerText = `• ${isFollowing ? i18n[currentLang].following : i18n[currentLang].follow}`;
                followBtn.classList.toggle('following', isFollowing);
            };

            const doLike = () => {
                isLiked = !isLiked;
                currentLikes += isLiked ? 1 : -1;
                stats.innerText = `${currentLikes} ${i18n[currentLang].likes}`;
                likeBtn.classList.toggle('liked', isLiked);
                likeBtn.querySelector('svg').innerHTML = isLiked ? 
                    `<path class="filled" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>` : 
                    `<path class="icon-path" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>`;
            };

            media.ondblclick = () => {
                if(!isLiked) doLike();
                popHeart.classList.remove('animate');
                void popHeart.offsetWidth;
                popHeart.classList.add('animate');
            };
            likeBtn.onclick = doLike;

            el.querySelector('.share-trigger').onclick = () => {
                document.getElementById('shareModal').style.display = 'flex';
            };

            input.oninput = () => postBtn.classList.toggle('active', input.value.trim() !== "");
            postBtn.onclick = () => {
                const val = input.value.trim();
                if(!val) return;
                const cRow = document.createElement('div');
                cRow.className = 'comment-row';
                // 使用 class="user-label" 方便语言切换时批量查找更新
                cRow.innerHTML = `<b class="user-label">${i18n[currentLang].you}</b> ${val}`;
                commList.appendChild(cRow);
                input.value = '';
                postBtn.classList.remove('active');
            };
        }

        function updateLanguageUI() {
            const d = i18n[currentLang];
            document.getElementById('createTxt').innerText = d.create;
            document.getElementById('shareTitle').innerText = d.shareTitle;
            document.getElementById('linkTxt').innerText = d.linkLabel;
            document.getElementById('echoQuote').innerText = d.echoQuote;
            document.getElementById('echoAuthor').innerText = d.echoAuthor;
            document.getElementById('friendTxt').innerText = d.friend;
            document.getElementById('familyTxt').innerText = d.family;
            document.getElementById('othersTxt').innerText = d.others;
            document.getElementById('closeEchoBtn').innerText = d.returnBtn;

            // 批量更新所有评论中已经存在的 “你”
            const userLabels = document.querySelectorAll('.user-label');
            userLabels.forEach(label => {
                label.innerText = d.you;
            });

            postsData.forEach(p => {
                const fBtn = document.getElementById(`follow-${p.id}`);
                if (fBtn) fBtn.innerText = `• ${fBtn.classList.contains('following') ? d.following : d.follow}`;
                const s = document.getElementById(`stat-${p.id}`);
                if (s) s.innerText = `${s.innerText.split(' ')[0]} ${d.likes}`;
                const inp = document.getElementById(`input-${p.id}`);
                if (inp) inp.placeholder = d.commentPlaceholder;
                const pb = document.getElementById(`post-${p.id}`);
                if (pb) pb.innerText = d.post;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            rendererList.forEach(r => {
                r.mesh.material.uniforms.time.value = time;
                r.renderer.render(r.scene, r.camera);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
